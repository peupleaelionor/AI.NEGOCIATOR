display_information:
  name: AI Negotiator
  description: Analyser une offre de salaire directement dans Slack
  background_color: "#2563eb"

features:
  bot_user:
    display_name: AI Negotiator
    always_online: false
  slash_commands:
    - command: /negotiate
      url: https://your-api.railway.app/slack/command
      description: Analyser une offre de salaire
      usage_hint: "[offre salariale ex: 42k€ dev full-stack Lyon 3 ans]"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - commands
      - chat:write

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
